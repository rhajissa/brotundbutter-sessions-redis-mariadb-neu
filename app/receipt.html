<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brot &amp; Butter - Quittung</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0b0c16;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-color: #6366f1;
      --success-color: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient glowing background shapes */
    .ambient-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      opacity: 0.5;
      pointer-events: none;
      width: 60vw;
      height: 60vw;
    }

    .glow-1 {
      top: -20%;
      left: -20%;
      background: radial-gradient(circle, #4f46e5, transparent 70%);
    }

    /* Glass Receipt Card */
    .receipt-card {
      position: relative;
      z-index: 1;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 35px 30px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    }

    .success-icon {
      font-size: 54px;
      color: var(--success-color);
      margin-bottom: 15px;
      display: inline-flex;
      background: rgba(16, 185, 129, 0.1);
      width: 90px;
      height: 90px;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      border: 1px solid rgba(16, 185, 129, 0.2);
      box-shadow: 0 0 25px rgba(16, 185, 129, 0.15);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .receipt-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .receipt-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 25px;
    }

    .receipt-divider {
      border: none;
      border-top: 1px dashed rgba(255, 255, 255, 0.15);
      margin: 20px 0;
    }

    /* Details Rows */
    .details-table {
      width: 100%;
      text-align: left;
      font-size: 14px;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    .details-row {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .details-row:last-child {
      border-bottom: none;
    }

    .details-label {
      padding: 14px 0;
      color: var(--text-muted);
      font-weight: 500;
      width: 40%;
    }

    .details-val {
      padding: 14px 0;
      color: var(--text-main);
      font-weight: 600;
      text-align: right;
    }

    .footer-msg {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="ambient-glow glow-1"></div>

  <div class="receipt-card">
    <div class="success-icon">✓</div>
    
    <h1 class="receipt-title">Ausleihe Bestätigt</h1>
    <p class="receipt-subtitle">Digitale Quittung</p>
    
    <table class="details-table">
      <tr class="details-row">
        <td class="details-label">Buch</td>
        <td class="details-val" id="valTitle">-</td>
      </tr>
      <tr class="details-row">
        <td class="details-label">Autor/in</td>
        <td class="details-val" id="valAuthor">-</td>
      </tr>
      <tr class="details-row">
        <td class="details-label">Exemplar-ID</td>
        <td class="details-val" id="valCode" style="font-family: monospace; font-size: 15px;">-</td>
      </tr>
      <tr class="details-row">
        <td class="details-label">Datum / Uhrzeit</td>
        <td class="details-val" id="valDate">-</td>
      </tr>
    </table>
    
    <hr class="receipt-divider">
    
    <p class="footer-msg">
      Vielen Dank für Ihren Besuch in der <strong>Brot &amp; Butter Bibliothek</strong>!<br>
      Bitte bewahren Sie diesen digitalen Beleg für Ihre Unterlagen auf.
    </p>
  </div>

  <script>
    // Get query parameters from URL
    const params = new URLSearchParams(window.location.search);
    
    document.getElementById('valTitle').textContent = params.get('title') || 'Unbekanntes Buch';
    document.getElementById('valAuthor').textContent = params.get('author') || 'Unbekannt';
    document.getElementById('valCode').textContent = params.get('code') || '-';
    document.getElementById('valDate').textContent = params.get('date') || new Date().toLocaleDateString('de-DE');
  </script>

</body>
</html>
